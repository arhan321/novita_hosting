# Redirect WWW menuju domain utama.
server {
    listen 80;
    server_name www.mbeorder.my.id;

    return 301 https://mbeorder.my.id$request_uri;
}

# Domain utama aplikasi.
server {
    listen 80;
    server_name mbeorder.my.id;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    server_tokens off;
    client_max_body_size 100M;

    error_log /var/log/nginx/mbeorder.error.log;
    access_log /var/log/nginx/mbeorder.access.log;

    # Header keamanan dasar.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Normalisasi URL gambar produk.
    location = /storage/products {
        return 301 /storage/products/;
    }

    # Gambar produk merupakan aset publik.
    location ^~ /storage/products/ {
        alias /var/www/html/storage/app/public/products/;

        access_log off;
        log_not_found off;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        limit_except GET HEAD {
            deny all;
        }
    }

    # File desain dan bukti pembayaran tidak boleh diakses langsung.
    location ^~ /storage/ {
        return 404;
    }

    # Seluruh request aplikasi diteruskan ke Laravel.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Konfigurasi PHP-FPM.
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # HTTPS ditangani oleh Cloudflare Tunnel.
        fastcgi_param HTTPS on;
        fastcgi_param SERVER_PORT 443;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_HOST $host;

        fastcgi_pass_request_headers on;
        fastcgi_hide_header X-Powered-By;
    }

    # Mencegah file sensitif seperti .env dan .git diakses.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}