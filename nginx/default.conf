server {
    listen 80;
    index index.php index.html;
    server_name novita.djncloud.my.id;

    error_log /var/log/nginx/novita.error.log;
    access_log /var/log/nginx/novita.access.log;

    root /var/www/html/public;
    client_max_body_size 100M;

    # Gambar produk memang merupakan aset publik.
    # Alias ini tidak membutuhkan symbolic link public/storage.
    location = /storage/products {
        return 301 /storage/products/;
    }

    location ^~ /storage/products/ {
        alias /var/www/html/storage/app/public/products/;
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options nosniff always;

        limit_except GET HEAD {
            deny all;
        }
    }

    # File desain dan bukti pembayaran tidak boleh dibuka langsung.
    # File tersebut dilayani oleh route Laravel setelah pemeriksaan role/order.
    location ^~ /storage/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_pass_request_headers on;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
